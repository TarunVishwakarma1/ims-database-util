syntax= "proto3";

package customer;

option go_package = "internal/gen/customerpb";

message Empty {}

message Customer {
    string id=1;
    string firstName=2;
    string lastName=3;
    string email=4;
    string phone=5;
    string address=6;
    string status=7;
    string userId=8;
    string createdAt=9;
    string updatedAt=10;
}

service CustomerService {
    rpc StreamCustomers(Empty) returns (stream Customer);
}